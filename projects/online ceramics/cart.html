<!DOCTYPE html>
<html lang="en">
<head>
	<script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
	<link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
	<link rel="icon" href="images/favicon.ico" type="image/x-icon">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>online ceramics</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id="top">
		<div id="home_button"><a href="home.html"><img id="logo" src="images/OC_logo.jpg" alt="blue logo"></a></div>
		<!-- add functionality of slide/pop-in cart menu -->
		<div class="cart"><a href="cart.html">Cart <span class="cart-count"></span></a></div>
	</div>
	<nav id="navbar">
			<div id="logoholder"><img id="logo" src="images/OC_logo.jpg" alt="blue logo"></div>
			<div id="aboutholder"><h1><a href="about.html">About</a></h1></div>
			<div id="apparelholder"><h1><a href="apparel.html">Apparel</a></h1></div>
			<div id="linksholder"><h1><a href="links.html">Links</a></h1></div>
			<div id="cartholder"><h1><a class="cart" href="cart.html"><u>Cart</u> <span class="cart-count"></span></a></h1></div>
	</nav>
	<div id="cart_view">
		<div id="container">
			<div class="product">
				<div class="top_container">
					<div class="prod_name"><p>Mario Ayala's Halloween<br>Black Tee</p></div>
					<div class="pricetag"><p>$110</p></div>
				</div>
				<div class="images">
					<img src="images/mario.jpg" alt="mario halloween tee">
				</div>
			</div>
		</div>
	</div>
	<div id="totaldiv">
		<span id="total"><p>Total</p></span>
		<span id="dollars"><p>$110</p></span>
	</div>
</body>
</html>
