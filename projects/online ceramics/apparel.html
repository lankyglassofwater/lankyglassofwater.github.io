<!DOCTYPE html>
<html lang="en">
<head>
	<script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
	<link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
	<link rel="icon" href="images/favicon.ico" type="image/x-icon">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>online ceramics</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id="top">
		<div id="home_button"><a href="home.html"><img id="logo" src="images/OC_logo.jpg" alt="blue logo"></a></div>
		<!-- add functionality of slide/pop-in cart menu -->
		<div id="cart"><a href="cart.html">Cart <span class="cart-count"></span></a></div>
	</div>
	<div id="product_list">
		<div class="product">
			<div><p>Mario Ayala's Halloween <br> Black Tee</p></div>
			<div class="images">
				<img src="images/mario.jpg" alt="mario halloween tee">
			</div>
			<div class="sizes">
				<button>XS</button>
				<button>S</button>
				<button>M</button>
				<button>L</button>
				<button>XL</button>
			</div>
			<div><button class="add">add to cart</button></div>
		</div>
		<div class="product">
			<div><p>Magic Blood Logo <br>Brown 14oz Heavywight Crewneck Sweatshirt</p></div>
			<div class="images">
				<img src="images/magic1.jpg" alt="brown magic crewneck sweatshirt front">
				<img src="images/magic2.jpg" alt="brown magic crewneck sweatshirt back">
			</div>
			<div class="sizes">
				<button>XS</button>
				<button>S</button>
				<button>M</button>
				<button>L</button>
				<button>XL</button>
			</div>
			<div><button class="add">add to cart</button></div>
		</div>
	</div>
	<div id="bottom_fade"></div>
	<script
  src="https://code.jquery.com/jquery-3.5.1.min.js"
  integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
  crossorigin="anonymous"></script>
	<script>
		let cartCounter = 0;

		$('.add').click(function(){
			$('.cart-count').css('display', 'inline-block')
			cartCounter++
			$('.cart-count').html(cartCounter)
		});

		$('.sizes button').click(function(){
			$(this).toggleClass('active-size')
			$('button').not(this).removeClass('active-size')
		});
			

		
	</script>
</body>
</html>
