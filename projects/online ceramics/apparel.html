	<script
  src="https://code.jquery.com/jquery-3.5.1.min.js"
  integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
  crossorigin="anonymous"></script>
	<script>
			let cartCounter = 0;

			$('.add').click(function(){
				$('.cart-count').css('display', 'inline-block')
				cartCounter++
				$('.cart-count').html(cartCounter)
			});

			$('.sizes button').click(function(){
				$(this).toggleClass('active-size')
				$('button').not(this).removeClass('active-size')
			});

			let cartItem = `
							<article class="cart-item grid">
								<div class="left"><span class="size">M</span><img src="http://placekitten.com/200/200"></div>
								<div class="right">words words words </div>
							</article>
							`
			$('#cart-view').click(function(e){
				$('.cart-display').toggleClass('hidden')
				$('main').toggleClass('hidden')
				$('.cart-display').html(``)
				if (cartCounter == 0) {
						$('.cart-display').html(`<article class="cart-empty">There is nothing in your cart</article>`)
					} else {
						for(let i = 0; i < cartCounter; i++){
							$('.cart-display').append(cartItem)
						}
					}
			})

		
	</script>
